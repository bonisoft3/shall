name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - run: gh release create ${{ github.ref_name }} shall.nu --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
